name: cv_project
description: Portfolio CV App - Phase 2 Mobile Development
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  # firebase_storage removed — using Cloudinary (free, no billing required)

  # HTTP — for Cloudinary upload
  http: ^1.2.1

  # State Management
  provider: ^6.1.2

  # Local Storage (Remember Me)
  shared_preferences: ^2.3.0

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Navigation
  go_router: ^14.1.4

  # Media / Image Upload
  image_picker: ^1.1.2                # Pick from gallery / camera
  file_picker: ^8.0.3

  # PDF Export
  pdf: ^3.10.8                        # Generate PDF
  printing: ^5.13.1                   # Preview + print PDF
  path_provider: ^2.1.3               # Save PDF file
  share_plus: ^9.0.0                  # Share PDF file

  # Utils
  url_launcher: ^6.3.0
  font_awesome_flutter: ^10.7.0
  intl: ^0.20.2
  uuid: ^4.4.0

  # Forms & Validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  rename: ^3.1.0
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/cvappicon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true


assets:
     - assets/images/
     - assets/animations/
     - assets/icons/cvappicon.png

fonts:
     - family: Syne
       fonts:
         - asset: assets/fonts/Syne-Regular.ttf
         - asset: assets/fonts/Syne-Bold.ttf
           weight: 700
         - asset: assets/fonts/Syne-ExtraBold.ttf
           weight: 800